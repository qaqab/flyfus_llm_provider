model: MiniMax-M2.7
label:
  zh_Hans: MiniMax-M2.7
  en_US: MiniMax-M2.7
model_type: llm
features:
  - agent-thought
  - tool-call
  - multi-tool-call
  - stream-tool-call
model_properties:
  mode: chat
  context_size: 200000
parameter_rules:
- name: temperature
  use_template: temperature
  default: 1
  min: 0
  max: 2
- name: top_p
  use_template: top_p
- name: max_tokens
  use_template: max_tokens
  default: 8192
  min: 1
  max: 128000
- name: response_format
  use_template: response_format
  options:
  - text
  - json_object
  - json_schema
- name: json_schema
  use_template: json_schema
pricing:
  input: '0'
  output: '0'
  unit: '0.000001'
  currency: USD
