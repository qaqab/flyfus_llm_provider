# https://platform.minimaxi.com/docs/guides/text-generation
model: minimax-m2.7
label:
  zh_Hans: minimax-m2.7
  en_US: minimax-m2.7
model_type: llm
features:
- agent-thought
- tool-call
- multi-tool-call
- stream-tool-call
model_properties:
  mode: chat
  context_size: 204800
parameter_rules:
- name: temperature
  use_template: temperature
  default: 1
  min: 0
  max: 2
- name: top_p
  use_template: top_p
- name: max_tokens
  use_template: max_tokens
  default: 128000
  min: 1
  max: 128000
- name: response_format
  use_template: response_format
  options:
  - text
  - json_object
  - json_schema
- name: json_schema
  use_template: json_schema
- name: enable_thinking
  required: false
  type: boolean
  default: false
  label:
    en_US: Thinking mode
    zh_Hans: 思考模式
  help:
    zh_Hans: 是否开启 MiniMax 思考模式。
    en_US: Whether to enable MiniMax thinking mode.
- name: thinking_budget
  required: false
  type: int
  default: 1024
  min: 1
  max: 128000
  label:
    en_US: Thinking budget
    zh_Hans: 思考预算
  help:
    zh_Hans: 思考预算 token 上限，只在思考模式开启时生效。
    en_US: The maximum length of the thinking process, only effective when thinking
      mode is enabled.
pricing:
  input: '0'
  output: '0'
  unit: '0.000001'
  currency: USD
extra:
  thinking:
    # Flyfus 中转站接收 OpenAI-compatible 的顶层思考字段，
    # 不接受 Anthropic 风格的 thinking.budget_tokens 对象。
    mode: top_level
