model: gemini-3.6-flash
label:
  zh_Hans: gemini-3.6-flash
  en_US: gemini-3.6-flash
model_type: llm
features:
- agent-thought
- vision
- document
- tool-call
- multi-tool-call
- stream-tool-call
model_properties:
  mode: chat
  context_size: 1048576
parameter_rules:
- name: temperature
  use_template: temperature
  default: 1
  min: 0
  max: 2
- name: top_p
  use_template: top_p
- name: max_tokens
  use_template: max_tokens
  default: 65536
  min: 1
  max: 65536
- name: response_format
  use_template: response_format
  options:
  - text
  - json_object
  - json_schema
- name: json_schema
  use_template: json_schema
- name: thinking_level
  label:
    en_US: Thinking Level
    zh_Hans: 思考层级
  type: string
  default: Low
  options:
  - Low
  - Medium
  - High
  required: false
  help:
    zh_Hans: 控制推理深度。Minimal 在当前上游质量不稳定，未提供。
    en_US: Controls reasoning depth. Minimal is omitted because it is unreliable on this upstream.
- name: enable_web_search
  type: boolean
  required: false
  default: false
  label:
    en_US: Web search
    zh_Hans: 联网搜索
  help:
    zh_Hans: 使用 Gemini 原生 Google Search，并返回 grounding 引用。
    en_US: Uses Gemini native Google Search and returns grounding citations.
pricing:
  input: '0'
  output: '0'
  unit: '0.000001'
  currency: USD
extra:
  thinking:
    mode: gemini
