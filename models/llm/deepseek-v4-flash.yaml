model: deepseek-v4-flash
label:
  zh_Hans: deepseek-v4-flash
  en_US: deepseek-v4-flash
model_type: llm
features:
- agent-thought
- tool-call
- multi-tool-call
- stream-tool-call
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
- name: temperature
  use_template: temperature
  default: 1
  min: 0
  max: 2
- name: top_p
  use_template: top_p
- name: max_tokens
  use_template: max_tokens
  default: 8192
  min: 1
  max: 8192
- name: response_format
  use_template: response_format
  options:
  - text
  - json_object
  - json_schema
- name: json_schema
  use_template: json_schema
- name: thinking
  label:
    en_US: Thinking Mode
    zh_Hans: 思考模式
  type: boolean
  default: true
  required: false
  help:
    zh_Hans: 控制是否启用 DeepSeek v4 的思考模式。
    en_US: Controls whether DeepSeek v4 thinking mode is enabled.
- name: reasoning_effort
  label:
    en_US: Reasoning Effort
    zh_Hans: 思考强度
  type: string
  default: high
  required: false
  options:
  - high
  - max
  help:
    zh_Hans: 控制思考模式下的推理强度。
    en_US: Controls reasoning effort in thinking mode.
pricing:
  input: '0'
  output: '0'
  unit: '0.000001'
  currency: USD
extra:
  thinking:
    mode: deepseek
