# https://docs.cloud.google.com/gemini-enterprise-agent-platform/models/gemini/3-1-flash-image
model: gemini-3.1-flash-image-preview
label:
  zh_Hans: gemini-3.1-flash-image-preview
  en_US: gemini-3.1-flash-image-preview
model_type: llm
features:
- agent-thought
- vision
- document
- video
model_properties:
  mode: chat
  context_size: 131072
parameter_rules:
- name: temperature
  use_template: temperature
  default: 1
  min: 0
  max: 2
- name: top_p
  use_template: top_p
- name: max_tokens
  use_template: max_tokens
  default: 8192
  min: 1
  max: 32768
pricing:
  input: '0'
  output: '0'
  unit: '0.000001'
  currency: USD
