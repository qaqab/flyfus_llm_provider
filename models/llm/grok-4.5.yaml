model: grok-4.5
label:
  zh_Hans: grok-4.5
  en_US: grok-4.5
model_type: llm
features:
- agent-thought
- tool-call
- multi-tool-call
- stream-tool-call
model_properties:
  mode: chat
  context_size: 500000
parameter_rules:
- name: temperature
  use_template: temperature
  default: 1
  min: 0
  max: 2
- name: top_p
  use_template: top_p
  default: 1
  min: 0
  max: 1
- name: max_tokens
  use_template: max_tokens
  default: 8192
  min: 1
- name: reasoning_effort
  type: string
  default: high
  options:
  - low
  - medium
  - high
- name: response_format
  use_template: response_format
  options:
  - text
  - json_object
  - json_schema
- name: enable_web_search
  label:
    zh_Hans: 联网搜索
    en_US: Web search
  type: boolean
  default: true
- name: json_schema
  use_template: json_schema
pricing:
  input: '2'
  output: '6'
  unit: '0.000001'
  currency: USD
