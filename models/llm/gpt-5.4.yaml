model: gpt-5.4
label:
  zh_Hans: gpt-5.4
  en_US: gpt-5.4
model_type: llm
features:
- agent-thought
- vision
- document
- tool-call
- multi-tool-call
- stream-tool-call
model_properties:
  mode: chat
  context_size: 1050000
parameter_rules:
- name: temperature
  use_template: temperature
  default: 1
  min: 0
  max: 2
- name: top_p
  use_template: top_p
- name: max_tokens
  use_template: max_tokens
  default: 128000
  min: 1
  max: 128000
- name: response_format
  use_template: response_format
  options:
  - text
  - json_object
  - json_schema
- name: json_schema
  use_template: json_schema
- name: reasoning_effort
  label:
    en_US: Reasoning effort
    zh_Hans: 推理强度
  type: string
  required: false
  options:
  - none
  - low
  - medium
  - high
  - xhigh
- name: enable_web_search
  label:
    zh_Hans: 联网搜索
    en_US: Web search
  type: boolean
  default: true
pricing:
  input: '2.50'
  output: '15.00'
  unit: '0.000001'
  currency: USD
extra:
  token_param_name: max_completion_tokens
