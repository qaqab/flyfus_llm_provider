model: glm-5.2
label:
  zh_Hans: glm-5.2
  en_US: glm-5.2
model_type: llm
features:
- agent-thought
- tool-call
- multi-tool-call
- stream-tool-call
model_properties:
  mode: chat
  context_size: 1000000
parameter_rules:
- name: temperature
  use_template: temperature
  default: 1
  min: 0
  max: 2
- name: top_p
  use_template: top_p
- name: max_tokens
  use_template: max_tokens
  default: 8192
  min: 1
  max: 8192
- name: response_format
  use_template: response_format
  options:
  - text
  - json_object
  - json_schema
- name: json_schema
  use_template: json_schema
- name: enable_thinking
  required: false
  type: boolean
  default: false
  label:
    en_US: Thinking mode
    zh_Hans: 思考模式
  help:
    zh_Hans: 是否开启思考模式。
    en_US: Whether to enable thinking mode.
- name: thinking_budget
  required: false
  type: int
  default: 4096
  min: 1
  max: 204800
  label:
    en_US: Thinking budget
    zh_Hans: 思考预算
  help:
    zh_Hans: 思考预算 token 上限，只在思考模式开启时生效。
    en_US: The maximum length of the thinking process, only effective when thinking
      mode is enabled.
pricing:
  input: '0'
  output: '0'
  unit: '0.000001'
  currency: USD
extra:
  thinking:
    mode: top_level
