provider: flyfus_llm_provider
author: qaqab
label:
  en_US: Flyfus LLM Provider
  zh_Hans: Flyfus 大模型供应商
description:
  en_US: OpenAI-compatible LLM provider.
  zh_Hans: OpenAI 兼容大模型供应商。
icon_small:
  en_US: icon.svg
supported_model_types:
  - llm
configurate_methods:
  - predefined-model
provider_credential_schema:
  credential_form_schemas:
    - variable: api_key
      label:
        en_US: API Key
        zh_Hans: API Key
      type: secret-input
      required: true
      placeholder:
        en_US: Enter API Key
        zh_Hans: 输入 API Key
    - variable: endpoint_url
      label:
        en_US: API endpoint URL
        zh_Hans: API 地址
      type: text-input
      required: true
      placeholder:
        en_US: Base URL, e.g. https://openapi.flyposter.ai/v1
        zh_Hans: Base URL，例如 https://openapi.flyposter.ai/v1
    - variable: sls_endpoint
      label:
        en_US: SLS Endpoint
        zh_Hans: SLS 地址
      type: text-input
      required: true
      placeholder:
        en_US: https://us-east-1.log.aliyuncs.com
        zh_Hans: 例如 https://us-east-1.log.aliyuncs.com
    - variable: sls_project
      label:
        en_US: SLS Project
        zh_Hans: SLS 项目
      type: text-input
      required: true
      placeholder:
        en_US: Enter SLS project name
        zh_Hans: 输入 SLS 项目名称
    - variable: sls_access_key_id
      label:
        en_US: SLS AccessKey ID
        zh_Hans: SLS AccessKey ID
      type: secret-input
      required: true
      placeholder:
        en_US: Enter SLS AccessKey ID
        zh_Hans: 输入 SLS AccessKey ID
    - variable: sls_access_key_secret
      label:
        en_US: SLS AccessKey Secret
        zh_Hans: SLS AccessKey Secret
      type: secret-input
      required: true
      placeholder:
        en_US: Enter SLS AccessKey Secret
        zh_Hans: 输入 SLS AccessKey Secret
    - variable: geo_prompt_render_url
      label:
        en_US: Geo Prompt Render URL
        zh_Hans: Geo Prompt 渲染地址
      type: text-input
      required: true
      placeholder:
        en_US: Enter Geo Prompt render URL
        zh_Hans: 输入 Geo Prompt 渲染地址
    - variable: geo_prompt_api_key
      label:
        en_US: Geo Prompt API Key
        zh_Hans: Geo Prompt API Key
      type: secret-input
      required: true
      placeholder:
        en_US: Enter Geo Prompt API Key
        zh_Hans: 输入 Geo Prompt API Key
    - variable: geo_env
      label:
        en_US: Geo Environment
        zh_Hans: Geo 环境
      type: text-input
      required: true
      placeholder:
        en_US: dev or prod
        zh_Hans: dev 或 prod
    - variable: geo_url
      label:
        en_US: Geo URL
        zh_Hans: Geo URL
      type: text-input
      required: true
      placeholder:
        en_US: Geo API base URL
        zh_Hans: Geo API 基础地址
    - variable: geo_key
      label:
        en_US: Geo Key
        zh_Hans: Geo Key
      type: secret-input
      required: true
      placeholder:
        en_US: Enter Geo Key
        zh_Hans: 输入 Geo Key
models:
  llm:
    predefined:
      - "models/llm/*.yaml"
    position: "models/llm/_position.yaml"
extra:
  python:
    provider_source: provider/flyfus_llm_provider.py
    model_sources:
      - "models/llm/llm.py"
